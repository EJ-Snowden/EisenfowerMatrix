<section class="page">
  <div class="hero">
    <div class="hero-title">{{ mode === 'signup' ? 'Create account' : 'Sign in' }}</div>
    <div class="hero-sub muted">
      Private tasks, synced in the cloud
    </div>
  </div>

  <div class="card card-pad auth-card">
    <form class="form" (ngSubmit)="submit()">
      <div class="field">
        <label class="label">Email</label>
        <input class="input" type="email" [formControl]="form.controls.email" placeholder="name@email.com" />
      </div>

      <div class="field">
        <label class="label">Password</label>
        <input class="input" type="password" [formControl]="form.controls.password" placeholder="min 6 chars" />
      </div>

      <div class="error" *ngIf="error">{{ error }}</div>

      <div class="actions">
        <button class="btn btn-primary" type="submit" [disabled]="loading || form.invalid">
          {{ loading ? '...' : (mode === 'signup' ? 'Sign up' : 'Sign in') }}
        </button>

        <button class="btn btn-ghost" type="button" (click)="switchMode()" [disabled]="loading">
          {{ mode === 'signup' ? 'I already have an account' : 'Create account' }}
        </button>
      </div>
    </form>
  </div>
</section>
