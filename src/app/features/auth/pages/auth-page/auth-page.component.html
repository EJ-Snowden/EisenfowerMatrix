<section class="page">
  <div class="hero">
    <div class="hero-title">
      {{ mode === 'signup' ? ('auth.signup.title' | t) : ('auth.signin.title' | t) }}
    </div>
    <div class="hero-sub muted">
      {{ 'auth.tagline' | t }}
    </div>
  </div>

  <div class="card card-pad auth-card">
    <form class="form" (ngSubmit)="submit()">
      <div class="field">
        <label class="label">{{ 'auth.email' | t }}</label>
        <input
          class="input"
          type="email"
          [formControl]="form.controls.email"
          [placeholder]="'auth.email.placeholder' | t"
        />
      </div>

      <div class="field">
        <label class="label">{{ 'auth.password' | t }}</label>
        <input
          class="input"
          type="password"
          [formControl]="form.controls.password"
          [placeholder]="'auth.password.placeholder' | t"
        />
      </div>

      <div class="error" *ngIf="errorKey">{{ errorKey | t }}</div>

      <div class="actions">
        <button class="btn btn-primary" type="submit" [disabled]="loading || form.invalid">
          {{
            loading
              ? '...'
              : (mode === 'signup' ? ('auth.btn.signup' | t) : ('auth.btn.signin' | t))
          }}
        </button>

        <button class="btn btn-ghost" type="button" (click)="switchMode()" [disabled]="loading">
          {{ mode === 'signup' ? ('auth.btn.toSignin' | t) : ('auth.btn.toSignup' | t) }}
        </button>
      </div>
    </form>
  </div>
</section>
