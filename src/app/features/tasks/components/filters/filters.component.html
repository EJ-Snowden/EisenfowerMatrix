<section class="card card-pad toolbar">
  <div class="row top-row">
    <div class="search-wrap">
      <label class="label">{{ 'filters.search' | t }}</label>
      <input
        class="input"
        type="text"
        [value]="search"
        (input)="onSearch($event)"
        [placeholder]="'filters.search.placeholder' | t"
      />
    </div>

    <div class="sort-wrap">
      <label class="label">{{ 'filters.sort' | t }}</label>
      <select class="select" [value]="sort" (change)="onSort($event)">
        <option *ngFor="let x of sortOptions" [value]="x">
          {{ sortLabelKey(x) | t }}
        </option>
      </select>
    </div>
  </div>

  <div class="row chips-row">
    <button type="button" class="chip" [class.active]="isActive('today')" (click)="setFilter('today')">
      {{ 'filters.today' | t }}
    </button>

    <button type="button" class="chip" [class.active]="isActive('tomorrow')" (click)="setFilter('tomorrow')">
      {{ 'filters.tomorrow' | t }}
    </button>

    <button type="button" class="chip" [class.active]="isActive('week')" (click)="setFilter('week')">
      {{ 'filters.week' | t }}
    </button>

    <button type="button" class="chip" [class.active]="isActive('overdue')" (click)="setFilter('overdue')">
      {{ 'filters.overdue' | t }}
    </button>

    <button type="button" class="chip" [class.active]="isActive('all')" (click)="setFilter('all')">
      {{ 'filters.all' | t }}
    </button>

    <button type="button" class="chip" [class.active]="isActive('done')" (click)="setFilter('done')">
      {{ 'filters.done' | t }}
    </button>
  </div>

  <div class="row bottom-row">
    <div class="date-wrap">
      <label class="label">{{ 'filters.pickDate' | t }}</label>
      <input class="input" type="date" [value]="selectedDate" (change)="onDate($event)" />
    </div>

    <div class="actions-wrap">
      <button type="button" class="btn btn-ghost" (click)="exportClick.emit()">
        {{ 'actions.export' | t }}
      </button>
      <button type="button" class="btn btn-primary" (click)="importClick.emit()">
        {{ 'actions.import' | t }}
      </button>
    </div>
  </div>
</section>
