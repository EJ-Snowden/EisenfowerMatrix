<section class="card card-pad">
  <div class="card-head">
    <h3 class="h3">{{ 'plist.title' | t }}</h3>
    <div class="muted">{{ 'plist.count' | t:{count: items.length} }}</div>
  </div>

  <div class="plist" *ngIf="items.length > 0; else empty">
    <div class="pitem" *ngFor="let x of items" [class.done]="x.task.isDone">
      <div class="topline">
        <div class="left">
          <span class="pill pill-accent">{{ x.quadrant }}</span>
          <span class="pill">{{ x.score | number: '1.0-0' }}</span>
          <span class="pill" [class.pill-danger]="x.deadline > 1 && !x.task.isDone">{{ x.task.dueDate }}</span>
        </div>

        <div class="right">
          <button type="button" class="btn btn-xs btn-ghost" (click)="onEdit(x.task.id)">{{ 'actions.edit' | t }}</button>

          <button type="button" class="btn btn-xs" (click)="onToggleDone(x.task.id)">
            {{ x.task.isDone ? ('actions.undone' | t) : ('actions.done' | t) }}
          </button>

          <button type="button" class="btn btn-xs btn-danger" (click)="onDelete(x.task.id)">{{ 'actions.delete' | t }}</button>
        </div>
      </div>

      <div class="title">{{ x.task.title }}</div>
      <div class="notes muted" *ngIf="x.task.notes">{{ x.task.notes }}</div>

      <div class="meta">
        <span class="pill">{{ x.task.effortMinutes }}m</span>
        <span class="pill">{{ x.task.energy }}</span>
        <span class="pill">{{ x.task.commitment }}</span>
        <span class="pill">{{ x.task.penalty }}</span>
      </div>
    </div>
  </div>

  <ng-template #empty>
    <div class="muted">{{ 'plist.empty' | t }}</div>
  </ng-template>
</section>
