<section class="card">
  <div class="top">
    <h3 class="title">{{ editTask ? ('form.edit' | t) : ('form.add' | t) }}</h3>

    <button type="button" class="link" (click)="toggleAdvanced()">
      {{ isAdvanced ? ('form.simple' | t) : ('form.advanced' | t) }}
    </button>
  </div>

  <form class="grid" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field col-2">
      <label class="label">{{ 'form.title' | t }}</label>
      <input
        class="input"
        type="text"
        formControlName="title"
        [placeholder]="'form.title.placeholder' | t"
      />
      <div class="error" *ngIf="titleInvalid">{{ 'form.title.error' | t }}</div>
    </div>

    <div class="field">
      <label class="label">{{ 'form.duedate' | t }}</label>
      <input class="input" type="date" formControlName="dueDate" />
      <div class="row">
        <button type="button" class="btn btn-xs" (click)="setToday()">{{ 'form.today' | t }}</button>
        <button type="button" class="btn btn-xs" (click)="setTomorrow()">{{ 'form.tomorrow' | t }}</button>
      </div>
    </div>

    <div class="field">
      <label class="label">{{ 'form.importance' | t:{v: (form.controls.importance.value ?? 0)} }}</label>

      <input
        class="range"
        type="range"
        min="0"
        max="100"
        step="1"
        [value]="form.controls.importance.value ?? 0"
        (input)="syncInt('importance', $event)"
      />

      <input
        class="input"
        type="number"
        min="0"
        max="100"
        step="1"
        [value]="form.controls.importance.value ?? 0"
        (input)="syncInt('importance', $event)"
      />
    </div>

    <div class="field">
      <label class="label">{{ 'form.urgency' | t:{v: (form.controls.urgencyFeeling.value ?? 0)} }}</label>

      <input
        class="range"
        type="range"
        min="0"
        max="100"
        step="1"
        [value]="form.controls.urgencyFeeling.value ?? 0"
        (input)="syncInt('urgencyFeeling', $event)"
      />

      <input
        class="input"
        type="number"
        min="0"
        max="100"
        step="1"
        [value]="form.controls.urgencyFeeling.value ?? 0"
        (input)="syncInt('urgencyFeeling', $event)"
      />
    </div>

    <div class="field col-2">
      <label class="label">{{ 'form.effort' | t }}</label>
      <div class="chips">
        <button
          type="button"
          class="chip"
          *ngFor="let m of effortOptions"
          [class.active]="form.controls.effortMinutes.value === m"
          (click)="setEffort(m)"
        >
          {{ m }}m
        </button>
      </div>
    </div>

    <ng-container *ngIf="isAdvanced">
      <div class="field">
        <label class="label">{{ 'form.energy' | t }}</label>
        <select class="select" formControlName="energy">
          <option *ngFor="let x of energyOptions" [ngValue]="x">
            {{ ('energy.' + x) | t }}
          </option>
        </select>
      </div>

      <div class="field">
        <label class="label">{{ 'form.commitment' | t }}</label>
        <select class="select" formControlName="commitment">
          <option *ngFor="let x of commitmentOptions" [ngValue]="x">
            {{ ('commitment.' + x) | t }}
          </option>
        </select>
      </div>

      <div class="field">
        <label class="label">{{ 'form.penalty' | t }}</label>
        <select class="select" formControlName="penalty">
          <option *ngFor="let x of penaltyOptions" [ngValue]="x">
            {{ ('penalty.' + x) | t }}
          </option>
        </select>
      </div>

      <div class="field">
        <label class="label">{{ 'form.category' | t }}</label>
        <select class="select" formControlName="category">
          <option [ngValue]="''">{{ 'form.none' | t }}</option>
          <option *ngFor="let x of categoryOptions" [ngValue]="x">
            {{ ('category.' + x) | t }}
          </option>
        </select>
      </div>

      <div class="field col-2">
        <label class="label">{{ 'form.notes' | t }}</label>
        <textarea class="textarea" rows="3" formControlName="notes"></textarea>
      </div>
    </ng-container>

    <div class="actions col-2">
      <button type="submit" class="btn btn-primary" [disabled]="form.invalid">
        {{ editTask ? ('form.btn.save' | t) : ('form.btn.add' | t) }}
      </button>

      <button type="button" class="btn btn-ghost" (click)="clear()">
        {{ editTask ? ('form.btn.cancel' | t) : ('form.btn.clear' | t) }}
      </button>
    </div>
  </form>
</section>
