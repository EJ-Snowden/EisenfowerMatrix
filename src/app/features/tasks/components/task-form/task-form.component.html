<section class="card">
  <div class="top">
    <h3 class="title">{{ editTask ? 'Edit task' : 'Add task' }}</h3>

    <button type="button" class="link" (click)="toggleAdvanced()">
      {{ isAdvanced ? 'Simple' : 'Advanced' }}
    </button>
  </div>

  <form class="grid" [formGroup]="form" (ngSubmit)="submit()">
    <div class="field col-2">
      <label>Title</label>
      <input type="text" formControlName="title" placeholder="What to do?" />
      <div class="error" *ngIf="titleInvalid">Title is required (min 2 chars)</div>
    </div>

    <div class="field">
      <label>Due date</label>
      <input type="date" formControlName="dueDate" />
      <div class="row">
        <button type="button" class="btn small" (click)="setToday()">Today</button>
        <button type="button" class="btn small" (click)="setTomorrow()">Tomorrow</button>
      </div>
    </div>

    <div class="field">
      <label>Importance: {{ form.controls.importance.value }}</label>
      <input type="range" min="0" max="100" formControlName="importance" />
      <input type="number" min="0" max="100" step="1" formControlName="importance" />
    </div>

    <div class="field">
      <label>Urgency feeling: {{ form.controls.urgencyFeeling.value }}</label>
      <input type="range" min="0" max="100" formControlName="urgencyFeeling" />
      <input type="number" min="0" max="100" step="1" formControlName="urgencyFeeling" />
    </div>

    <div class="field col-2">
      <label>Effort</label>
      <div class="chips">
        <button
          type="button"
          class="chip"
          *ngFor="let m of effortOptions"
          [class.active]="form.controls.effortMinutes.value === m"
          (click)="setEffort(m)"
        >
          {{ m }}m
        </button>
      </div>
    </div>

    <ng-container *ngIf="isAdvanced">
      <div class="field">
        <label>Energy</label>
        <select formControlName="energy">
          <option *ngFor="let x of energyOptions" [value]="x.value">{{ x.label }}</option>
        </select>
      </div>

      <div class="field">
        <label>Commitment</label>
        <select formControlName="commitment">
          <option *ngFor="let x of commitmentOptions" [value]="x.value">{{ x.label }}</option>
        </select>
      </div>

      <div class="field">
        <label>Penalty</label>
        <select formControlName="penalty">
          <option *ngFor="let x of penaltyOptions" [value]="x.value">{{ x.label }}</option>
        </select>
      </div>

      <div class="field">
        <label>Category</label>
        <select formControlName="category">
          <option value="">None</option>
          <option *ngFor="let x of categoryOptions" [value]="x.value">{{ x.label }}</option>
        </select>
      </div>

      <div class="field col-2">
        <label>Notes</label>
        <textarea rows="3" formControlName="notes"></textarea>
      </div>
    </ng-container>

    <div class="actions col-2">
      <button type="submit" class="btn primary" [disabled]="form.invalid">
        {{ editTask ? 'Save' : 'Add' }}
      </button>

      <button type="button" class="btn" (click)="clear()">
        {{ editTask ? 'Cancel' : 'Clear' }}
      </button>
    </div>
  </form>
</section>
