<section class="page">
  <div class="head">
    <div class="head-left">
      <h2 class="h2">Tasks</h2>
      <div class="muted2">Matrix + priority score</div>
    </div>

    <app-filters [active]="activeFilter" (filterChange)="onFilterChange($event)"></app-filters>
  </div>

  <div class="card card-pad">
    <div class="card-head">
      <h3 class="h3">Create</h3>
      <div class="muted">Simple or Advanced</div>
    </div>

    <app-task-form (createTask)="onCreateTask($event)"></app-task-form>
  </div>

  <ng-container *ngIf="ranked$ | async as ranked">
    <div class="layout">
      <app-matrix
        class="left"
        [items]="ranked"
        (editTask)="startEdit($event)"
        (toggleDone)="onToggleDone($event)"
        (deleteTask)="onDeleteTask($event)"
      ></app-matrix>

      <app-priority-list
        class="right"
        [items]="ranked"
        (editTask)="startEdit($event)"
        (toggleDone)="onToggleDone($event)"
        (deleteTask)="onDeleteTask($event)"
      ></app-priority-list>
    </div>
  </ng-container>

  <ng-container *ngIf="editingTask$ | async as t">
    <div class="modal-backdrop" *ngIf="t" (click)="closeEdit()"></div>

    <div class="modal" *ngIf="t">
      <div class="card card-pad modal-card">
        <div class="card-head">
          <h3 class="h3">Edit</h3>
          <button class="btn btn-ghost btn-xs" type="button" (click)="closeEdit()">Close</button>
        </div>

        <app-task-form
          [editTask]="t"
          (updateTask)="onUpdateTask($event)"
          (cancelEdit)="closeEdit()"
        ></app-task-form>
      </div>
    </div>
  </ng-container>
</section>
