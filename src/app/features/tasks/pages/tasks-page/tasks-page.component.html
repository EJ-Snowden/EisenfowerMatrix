<section class="page" *ngIf="vm$ | async as vm">
  <section class="card card-pad hero-card">
    <div class="hero-copy">
      <h2 class="h2">{{ 'tasks.title' | t }}</h2>
      <div class="muted">{{ 'tasks.subtitle' | t }}</div>
    </div>

    <div class="hero-actions">
      <button type="button" class="btn btn-primary" (click)="openCreate()">
        {{ 'tasks.openCreate' | t }}
      </button>

      <button type="button" class="btn btn-ghost" (click)="toggleLayoutMode()">
        {{ layoutEditMode ? ('layout.done' | t) : ('layout.edit' | t) }}
      </button>

      <button type="button" class="btn btn-ghost" (click)="resetLayout()">
        {{ 'layout.reset' | t }}
      </button>
    </div>
  </section>

  <input
    #fileInput
    type="file"
    hidden
    accept="application/json,.json"
    (change)="onImportFile($event)"
  />

  <div class="flash success" *ngIf="flashKey === 'tasks.import.success'">
    {{ 'tasks.import.success' | t }}
  </div>

  <div class="flash error" *ngIf="flashKey === 'tasks.import.error'">
    {{ 'tasks.import.error' | t }}
  </div>

  <ng-container *ngFor="let section of sectionOrder; trackBy: trackBySection">
    <section class="page-block">
      <div class="block-toolbar" *ngIf="layoutEditMode">
        <div class="block-name">
          {{ layoutLabelKey(section) | t }}
        </div>

        <div class="block-toolbar-actions">
          <button
            type="button"
            class="btn btn-xs btn-ghost"
            (click)="moveSectionUp(section)"
            [disabled]="!canMoveUp(section)"
          >
            {{ 'layout.moveUp' | t }}
          </button>

          <button
            type="button"
            class="btn btn-xs btn-ghost"
            (click)="moveSectionDown(section)"
            [disabled]="!canMoveDown(section)"
          >
            {{ 'layout.moveDown' | t }}
          </button>
        </div>
      </div>

      <ng-container [ngSwitch]="section">
        <app-filters
          *ngSwitchCase="'filters'"
          [active]="filter"
          [search]="search"
          [selectedDate]="selectedDate"
          [sort]="sort"
          (filterChange)="setFilter($event)"
          (searchChange)="setSearch($event)"
          (dateChange)="setSelectedDate($event)"
          (sortChange)="setSort($event)"
          (exportClick)="exportJson(vm.allTasks)"
          (importClick)="triggerImport()"
        />

        <app-matrix
          *ngSwitchCase="'matrix'"
          [items]="vm.items"
          (editTask)="openEdit($event)"
          (deleteTask)="requestDelete($event)"
          (toggleDone)="toggleDone($event, vm.allTasks)"
        />

        <app-priority-list
          *ngSwitchCase="'list'"
          [items]="vm.items"
          (editTask)="openEdit($event)"
          (deleteTask)="requestDelete($event)"
          (toggleDone)="toggleDone($event, vm.allTasks)"
        />
      </ng-container>
    </section>
  </ng-container>

  <button type="button" class="fab btn btn-primary" (click)="openCreate()">
    +
  </button>

  <ng-container *ngIf="isFormOpen">
    <div class="modal-backdrop" (click)="closeForm()"></div>
    <div class="modal">
      <div class="sheet card card-pad" (click)="$event.stopPropagation()">
        <app-task-form
          [editTask]="vm.editingTask"
          (createTask)="createTask($event)"
          (updateTask)="updateTask($event)"
          (cancelEdit)="closeForm()"
        />
      </div>
    </div>
  </ng-container>

  <ng-container *ngIf="vm.deleteTask as deleteTask">
    <div class="modal-backdrop" (click)="deleteId = null"></div>
    <div class="modal">
      <section class="confirm card card-pad" (click)="$event.stopPropagation()">
        <div class="confirm-title">{{ 'confirm.delete.title' | t }}</div>
        <div class="confirm-text">{{ 'confirm.delete.message' | t:{ title: deleteTask.title } }}</div>
        <div class="confirm-hint muted">{{ 'confirm.delete.hint' | t }}</div>

        <div class="confirm-actions">
          <button type="button" class="btn btn-ghost" (click)="deleteId = null">
            {{ 'form.btn.cancel' | t }}
          </button>
          <button type="button" class="btn btn-danger" (click)="confirmDelete()">
            {{ 'actions.delete' | t }}
          </button>
        </div>
      </section>
    </div>
  </ng-container>
</section>
